    const FIREBASE_CONFIG = {
      apiKey: "AIzaSyBT6yzHRtLYte3OnflLMz4xhgyOtB89zj4",
      authDomain: "sagitario-asistencia.firebaseapp.com",
      databaseURL: "https://sagitario-asistencia-default-rtdb.firebaseio.com",
      projectId: "sagitario-asistencia",
      storageBucket: "sagitario-asistencia.firebasestorage.app",
      messagingSenderId: "902602997632",
      appId: "1:902602997632:web:9d9bf9285c00e52b800b65"
    };
    // ============================================================

    let firebaseReady = false;
    let db = null;
    try {
      firebase.initializeApp(FIREBASE_CONFIG);
      db = firebase.database();
      firebaseReady = true;
    } catch(e) {
      console.warn("Firebase no configurado — usando localStorage como respaldo");
    }

    // ========== STORAGE WRAPPER — Firebase primero, localStorage de respaldo ==========
    window.storage = {
      get: async (key) => {
        const safeKey = key.replace(/[.#$[\]]/g, "_");
        if (firebaseReady) {
          try {
            const snap = await db.ref("sagitario/" + safeKey).once("value");
            const val = snap.val();
            if (val !== null) return { key, value: val };
          } catch(e) { console.warn("Firebase read error", e); }
        }
        const val = localStorage.getItem(key);
        return val !== null ? { key, value: val } : null;
      },
      set: async (key, value) => {
        const safeKey = key.replace(/[.#$[\]]/g, "_");
        if (firebaseReady) {
          try {
            await db.ref("sagitario/" + safeKey).set(value);
          } catch(e) { console.warn("Firebase write error", e); }
        }
        localStorage.setItem(key, value);
        return { key, value };
      },
      delete: async (key) => {
        const safeKey = key.replace(/[.#$[\]]/g, "_");
        if (firebaseReady) {
          try { await db.ref("sagitario/" + safeKey).remove(); } catch(e) {}
        }
        localStorage.removeItem(key);
        return { key, deleted: true };
      },
      // Escucha cambios en tiempo real (para sync entre dispositivos)
      listen: (key, callback) => {
        const safeKey = key.replace(/[.#$[\]]/g, "_");
        if (firebaseReady) {
          db.ref("sagitario/" + safeKey).on("value", snap => {
            const val = snap.val();
            if (val !== null) callback(val);
          });
        }
      },
      unlisten: (key) => {
        const safeKey = key.replace(/[.#$[\]]/g, "_");
        if (firebaseReady) {
          try { db.ref("sagitario/" + safeKey).off(); } catch(e) {}
        }
      },
      // Obtener y actualizar correlativo de forma segura
      nextCounter: async () => {
        if (!firebaseReady) {
          const cur = parseInt(localStorage.getItem("sagitario-counter") || "0") + 1;
          localStorage.setItem("sagitario-counter", cur);
          return cur;
        }
        return new Promise((resolve) => {
          db.ref("sagitario/sagitario-counter").transaction(cur => (cur || 0) + 1, (err, committed, snap) => {
            if (committed) resolve(snap.val());
            else {
              const fb = parseInt(localStorage.getItem("sagitario-counter") || "0") + 1;
              localStorage.setItem("sagitario-counter", fb);
              resolve(fb);
            }
          });
        });
      }
    };
  </script>

// ========== SIGNATURE PAD COMPONENT ==========
function SignaturePad({ value, onChange, width = 500, height = 160 }) {
  const canvasRef = useRef(null);
  const [drawing, setDrawing] = useState(false);
  const [hasDrawn, setHasDrawn] = useState(false);

  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext("2d");
    if (value) {
      const img = new Image();
      img.onload = () => {
        ctx.clearRect(0, 0, width, height);
        ctx.drawImage(img, 0, 0);
      };
      img.src = value;
    } else {
      ctx.clearRect(0, 0, width, height);
      ctx.strokeStyle = "#94a3b8";
      ctx.setLineDash([4, 4]);
      ctx.beginPath();
      ctx.moveTo(10, height - 15);
      ctx.lineTo(width - 10, height - 15);
      ctx.stroke();
      ctx.setLineDash([]);
    }
  }, [value, width, height]);

  const getPos = (e) => {
    const canvas = canvasRef.current;
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    if (e.touches) {
      return {
        x: (e.touches[0].clientX - rect.left) * scaleX,
        y: (e.touches[0].clientY - rect.top) * scaleY
      };
    }
    return {
      x: (e.clientX - rect.left) * scaleX,
      y: (e.clientY - rect.top) * scaleY
    };
  };

  const startDraw = (e) => {
    e.preventDefault();
    const canvas = canvasRef.current;
    const ctx = canvas.getContext("2d");
    const pos = getPos(e);
    ctx.beginPath();
    ctx.moveTo(pos.x, pos.y);
    ctx.strokeStyle = "#1a1a2e";
    ctx.lineWidth = 3;
    ctx.lineCap = "round";
    ctx.lineJoin = "round";
    setDrawing(true);
    if (!hasDrawn) {
      ctx.clearRect(0, 0, width, height);
      setHasDrawn(true);
    }
  };

  const draw = (e) => {
    if (!drawing) return;
    e.preventDefault();
    const canvas = canvasRef.current;
    const ctx = canvas.getContext("2d");
    const pos = getPos(e);
    ctx.lineTo(pos.x, pos.y);
    ctx.stroke();
  };

  const endDraw = (e) => {
    if (!drawing) return;
    e.preventDefault();
    setDrawing(false);
    const canvas = canvasRef.current;
    onChange(canvas.toDataURL());
  };

  const clear = () => {
    const canvas = canvasRef.current;
    const ctx = canvas.getContext("2d");
    ctx.clearRect(0, 0, width, height);
    setHasDrawn(false);
    onChange(null);
  };

  return (
    <div style={{ position: "relative", width: "100%" }}>
      <canvas
        ref={canvasRef}
        width={width}
        height={height}
        style={{
          border: "2px solid #e2a500",
          borderRadius: 12,
          cursor: "crosshair",
          touchAction: "none",
          background: "#fff",
          width: "100%",
          height: "auto",
          aspectRatio: `${width}/${height}`,
          display: "block",
        }}
        onMouseDown={startDraw}
        onMouseMove={draw}
        onMouseUp={endDraw}
        onMouseLeave={endDraw}
        onTouchStart={startDraw}
        onTouchMove={draw}
        onTouchEnd={endDraw}
      />
      {hasDrawn && (
        <button
          onClick={clear}
          style={{
            position: "absolute", top: 6, right: 6,
            background: "#ef4444", color: "#fff", border: "none",
            borderRadius: "50%", width: 28, height: 28, fontSize: 14,
            cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center",
            lineHeight: 1, boxShadow: "0 2px 8px rgba(0,0,0,0.3)",
          }}
        >✕</button>
      )}
    </div>
  );
}

// ========== EMPLOYEE SEARCH COMPONENT ==========
function EmployeeSearch({ onSelect, excludeIds = [], employees = [] }) {
  const [query, setQuery] = useState("");
  const [results, setResults] = useState([]);
  const [show, setShow] = useState(false);
  const ref = useRef(null);

  useEffect(() => {
    const handler = (e) => {
      if (ref.current && !ref.current.contains(e.target)) setShow(false);
    };
    document.addEventListener("mousedown", handler);
    return () => document.removeEventListener("mousedown", handler);
  }, []);

  const search = (val) => {
    setQuery(val);
    if (val.length < 2) { setResults([]); return; }
    const q = val.toLowerCase();
    const filtered = employees.filter(e =>
      !excludeIds.includes(e.id) &&
      (e.nombres.toLowerCase().includes(q) || e.dni.includes(q))
    );
    setResults(filtered.slice(0, 8));
    setShow(true);
  };

  return (
    <div ref={ref} style={{ position: "relative", width: "100%" }}>
      <input
        type="text"
        value={query}
        onChange={(e) => search(e.target.value)}
        onFocus={() => query.length >= 2 && setShow(true)}
        placeholder="Buscar por nombre o DNI..."
        style={{
          width: "100%", padding: "10px 14px", border: "2px solid #e2a500",
          borderRadius: 8, fontSize: 14, outline: "none",
          background: "#fffbeb", fontFamily: "'DM Sans', sans-serif",
          boxSizing: "border-box",
        }}
      />
      {show && results.length > 0 && (
        <div style={{
          position: "absolute", top: "100%", left: 0, right: 0, zIndex: 100,
          background: "#fff", border: "1px solid #e5e7eb", borderRadius: 8,
          boxShadow: "0 12px 32px rgba(0,0,0,0.15)", maxHeight: 260, overflowY: "auto",
        }}>
          {results.map(emp => (
            <div
              key={emp.id}
              onClick={() => { onSelect(emp); setQuery(""); setShow(false); setResults([]); }}
              style={{
                padding: "10px 14px", cursor: "pointer", borderBottom: "1px solid #f3f4f6",
                transition: "background 0.15s",
              }}
              onMouseEnter={e => e.currentTarget.style.background = "#fef3c7"}
              onMouseLeave={e => e.currentTarget.style.background = "#fff"}
            >
              <div style={{ fontWeight: 600, fontSize: 13, color: "#1a1a2e" }}>{emp.nombres}</div>
              <div style={{ fontSize: 11, color: "#6b7280", marginTop: 2 }}>
                DNI: {emp.dni} · {emp.cargo} · {emp.area}
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ========== UNIFIED PDF: REPORT + ATTENDANCE LIST ==========
function generatePDFContent(list) {
  const signed = list.attendees.filter(a => a.firma).length;
  const total = list.attendees.length;
  const pct = total > 0 ? Math.round((signed / total) * 100) : 0;
  const m0 = list.attendees.filter(a => a.mood === 0).length;
  const m1 = list.attendees.filter(a => a.mood === 1).length;
  const m2 = list.attendees.filter(a => a.mood === 2).length;
  const unsigned = list.attendees.filter(a => !a.firma);

  // Group by area
  const byArea = {};
  list.attendees.forEach(a => {
    if (!byArea[a.area]) byArea[a.area] = { total: 0, signed: 0, names: [] };
    byArea[a.area].total++;
    if (a.firma) byArea[a.area].signed++;
    else byArea[a.area].names.push(a.nombres);
  });

  // Group by cargo
  const byCargo = {};
  list.attendees.forEach(a => {
    if (!byCargo[a.cargo]) byCargo[a.cargo] = { total: 0, signed: 0 };
    byCargo[a.cargo].total++;
    if (a.firma) byCargo[a.cargo].signed++;
  });

  const areaRows = Object.entries(byArea).map(([area, d]) => {
    const ap = d.total > 0 ? Math.round((d.signed / d.total) * 100) : 0;
    const color = ap === 100 ? "#22c55e" : ap >= 80 ? "#f59e0b" : "#ef4444";
    return `<tr>
      <td style="font-size:10px;padding:6px 8px;font-weight:600;">${area}</td>
      <td style="font-size:10px;text-align:center;">${d.total}</td>
      <td style="font-size:10px;text-align:center;">${d.signed}</td>
      <td style="font-size:10px;text-align:center;">${d.total - d.signed}</td>
      <td style="text-align:center;"><span style="background:${color};color:#fff;padding:2px 10px;border-radius:10px;font-size:10px;font-weight:700;">${ap}%</span></td>
      <td style="font-size:9px;color:#666;">${d.names.length > 0 ? d.names.join(", ") : "✓ Completo"}</td>
    </tr>`;
  }).join("");

  const cargoRows = Object.entries(byCargo).map(([cargo, d]) => {
    const cp = d.total > 0 ? Math.round((d.signed / d.total) * 100) : 0;
    const color = cp === 100 ? "#22c55e" : cp >= 80 ? "#f59e0b" : "#ef4444";
    return `<tr>
      <td style="font-size:10px;padding:6px 8px;font-weight:600;">${cargo}</td>
      <td style="font-size:10px;text-align:center;">${d.total}</td>
      <td style="font-size:10px;text-align:center;">${d.signed}</td>
      <td style="text-align:center;"><span style="background:${color};color:#fff;padding:2px 10px;border-radius:10px;font-size:10px;font-weight:700;">${cp}%</span></td>
    </tr>`;
  }).join("");

  const unsignedRows = unsigned.map(a => `<tr>
    <td style="font-size:10px;padding:4px 8px;">${a.nombres}</td>
    <td style="font-size:10px;text-align:center;">${a.dni}</td>
    <td style="font-size:10px;text-align:center;">${a.area}</td>
    <td style="font-size:10px;text-align:center;">${a.cargo}</td>

  const m2 = list.attendees.filter(a => a.mood === 2).length;
  const unsigned = list.attendees.filter(a => !a.firma);

  const byArea = {};
  list.attendees.forEach(a => {
    if (!byArea[a.area]) byArea[a.area] = { total: 0, signed: 0, names: [] };
    byArea[a.area].total++;
    if (a.firma) byArea[a.area].signed++;
    else byArea[a.area].names.push(a.nombres);

  const byCargo = {};
  list.attendees.forEach(a => {
    if (!byCargo[a.cargo]) byCargo[a.cargo] = { total: 0, signed: 0 };
    byCargo[a.cargo].total++;
    if (a.firma) byCargo[a.cargo].signed++;

  const areaRows = Object.entries(byArea).map(([area, d]) => {
    const ap = d.total > 0 ? Math.round((d.signed / d.total) * 100) : 0;

  // ========== SHAREPOINT PDF UPLOAD ==========
  const uploadPDFtoSharePoint = async (list) => {
    const html = generatePDFContent(list);
    const fileName = `Lista_Asistencia_${list.nRegistro}_${list.fecha}.html`;
    const POWER_AUTOMATE_URL = POWER_AUTOMATE_UPLOAD_URL;

    setUploading(true);
    try {
      const blob = new Blob([html], { type: "text/html;charset=utf-8" });
      const reader = new FileReader();
      const base64 = await new Promise((resolve, reject) => {
        reader.onload = () => resolve(reader.result.split(",")[1]);
        reader.onerror = reject;
        reader.readAsDataURL(blob);
      });

      const response = await fetch(POWER_AUTOMATE_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          fileName, fileContent: base64,
          metadata: {
            nRegistro: list.nRegistro, tema: list.tema,
            tipoActividad: list.tipoActividad, fecha: list.fecha,
            totalAsistentes: list.attendees.length,
            firmados: list.attendees.filter(a => a.firma).length,
            capacitador: list.capacitador, responsable: list.responsableNombre,
          }
        }),
      });

      if (response.ok) {
        const respText = await response.text();
        let respData = {};
        try { respData = JSON.parse(respText); } catch(e) {}
        if (respData.success === false) {
          throw new Error(respData.message || "Error en el flujo");
        }
        notify(`✅ "${fileName}" guardado en SharePoint`);
        return true;
      } else {
        const errBody = await response.text();
        console.error("Upload error response:", response.status, errBody);
        throw new Error(`Error ${response.status}: ${errBody.substring(0, 100)}`);
      }
    } catch (err) {
      console.error("SharePoint upload error:", err);
      // Fallback: download locally
      const blob = new Blob([html], { type: "text/html;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url; a.download = fileName;
      document.body.appendChild(a); a.click();
      document.body.removeChild(a); URL.revokeObjectURL(url);
      notify(`⚠ Error SharePoint: ${err.message}. Archivo descargado localmente.`, "error");
      return false;
    } finally {
      setUploading(false);
    }
  };

        return {
          ...l, source: "active",
          totalAsistentes: total, firmados: signed,
          porcentaje: total > 0 ? Math.round((signed / total) * 100) : 0,
          moodCounts: [
            l.attendees.filter(a => a.mood === 0).length,
            l.attendees.filter(a => a.mood === 1).length,
            l.attendees.filter(a => a.mood === 2).length,
          ],
        };
      }),
    ];

    const byArea = {};
    const byCargo = {};
    AREAS.forEach(a => { byArea[a] = { total: 0, attended: 0 }; });
    CARGOS.forEach(c => { byCargo[c] = { total: 0, attended: 0 }; });

    // Aggregate from history
    completedHistory.forEach(h => {
      if (h.attendeesByArea) {

          if (byArea[area]) { byArea[area].total += data.total; byArea[area].attended += data.signed; }

      if (h.attendeesByCargo) {

          if (byCargo[cargo]) { byCargo[cargo].total += data.total; byCargo[cargo].attended += data.signed; }
        });
      }
    });

    // Aggregate from active lists
    lists.forEach(list => {
      list.attendees.forEach(a => {
        if (byArea[a.area]) { byArea[a.area].total++; if (a.firma) byArea[a.area].attended++; }
        if (byCargo[a.cargo]) { byCargo[a.cargo].total++; if (a.firma) byCargo[a.cargo].attended++; }
      });
    });

    return {
      totalEmployees,
      completedLists: completedHistory.length,
      activeLists: lists.filter(l => l.status === "activa").length,

      byArea, byCargo, allEntries,

              <div style={{ fontSize: 13, color: "#94a3b8" }}>

    const cl = currentList;

      const updated = { ...cl };
      updated.attendees = [...cl.attendees];
      updated.attendees[idx] = { ...updated.attendees[idx], [key]: val };
      if (key === "firma" && val) {
        updated.attendees[idx].signedAt = new Date().toISOString();
      }
      setCurrentList(updated);
    };

    const markComplete = () => {
      // Save current progress first
      saveList(cl);
      setConfirmModal({
        title: "✅ ¡Lista completa al 100%!",
        message: `Todos los ${cl.attendees.length} asistentes han firmado. Al cerrar la lista se subirá el PDF a SharePoint y se eliminará de la app. ¿Deseas cerrarla ahora?`,
        confirmText: "Cerrar y Subir a SharePoint",
        danger: false,
        onConfirm: () => closeList(cl, "completada"),
      });
    };

      if (!cl.responsableFirma) {
        notify("La firma del Responsable es obligatoria para cerrar la lista. Fírmala arriba antes de cerrar.", "error");

        return;

      setConfirmModal({
        title: `¿Cerrar lista ${cl.nRegistro}?`,
        message: `La lista tiene ${signed}/${cl.attendees.length} firmados (${pct}%). Se subirá el PDF a SharePoint con el estado actual y se eliminará de la app.`,

                );
                if (idx >= 0) {
                  document.getElementById(`attendee-${idx}`)?.scrollIntoView({ behavior: "smooth", block: "center" });
                }
              }
            }}
          />
        </div>

        {/* Attendee Cards for Signing */}
        <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
          {cl.attendees.map((a, i) => (
            <div key={i} id={`attendee-${i}`} style={{
              ...s.card,
              borderLeft: a.firma ? "4px solid #22c55e" : "4px solid rgba(255,255,255,0.1)",
              padding: 20,
            }}>
              {/* Employee Info Row */}
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: a.firma ? 0 : 16 }}>
                <div>
                  <div style={{ fontSize: 17, fontWeight: 700, color: "#fff" }}>{i + 1}. {a.nombres}</div>
                  <div style={{ fontSize: 13, color: "#94a3b8", marginTop: 4 }}>
                    DNI: {a.dni} · {a.fotocheck} · {a.cargo} · {a.area}
                  </div>
                </div>
                {a.firma && <span style={s.badge("#22c55e")}>✓ Firmado</span>}
              </div>

              {!a.firma && (
                <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
                  {/* Mood Selector - big for touch */}
                  <div>
                    <div style={{ fontSize: 14, color: "#cbd5e1", marginBottom: 10, fontWeight: 600 }}>¿Cómo te sientes hoy?</div>
                    <div style={{ display: "flex", gap: 12 }}>
                      {MOODS.map((m, mi) => (
                        <button key={mi} onClick={() => updateAttendee(i, "mood", mi)} style={{
                          width: 56, height: 56, borderRadius: "50%", fontSize: 30,
                          border: a.mood === mi ? `3px solid ${m.color}` : "2px solid rgba(255,255,255,0.15)",
                          background: a.mood === mi ? m.color + "22" : "transparent",
                          cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center",
                          transition: "all 0.2s", boxShadow: a.mood === mi ? `0 0 16px ${m.color}44` : "none",
                        }}>{m.emoji}</button>
                      ))}
                    </div>
                  </div>

                  {/* Signature - FULL WIDTH */}
                  <div>
                    <div style={{ fontSize: 14, color: "#cbd5e1", marginBottom: 10, fontWeight: 600 }}>✍️ Firma aquí (usa tu dedo o stylus)</div>
                    <SignaturePad value={a.firma} onChange={(sig) => updateAttendee(i, "firma", sig)} />
                  </div>

                  {/* Observations */}
                  <input
                    style={{ ...s.input, fontSize: 14, padding: "12px 16px" }}
                    placeholder="Observaciones (opcional)..."
                    value={a.observaciones || ""}
                    onChange={e => updateAttendee(i, "observaciones", e.target.value)}
                  />
                </div>
              )}
            </div>
          ))}
        </div>

        {/* Responsable Signature Section */}
        <div id="responsable-sign-section" style={{
          ...s.card, marginTop: 24,
          borderLeft: cl.responsableFirma ? "4px solid #e2a500" : "4px solid rgba(255,255,255,0.1)",
          background: "rgba(226,165,0,0.06)",
        }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: cl.responsableFirma ? 0 : 16 }}>
            <div>
              <div style={{ fontSize: 13, color: "#e2a500", fontWeight: 700, textTransform: "uppercase", letterSpacing: 1, marginBottom: 6 }}>Responsable del Registro</div>
              <div style={{ fontSize: 17, fontWeight: 700, color: "#fff" }}>{cl.responsableNombre || "—"}</div>
              <div style={{ fontSize: 13, color: "#94a3b8", marginTop: 2 }}>{cl.responsableCargo || "—"}</div>
            </div>
            {cl.responsableFirma && <span style={s.badge("#e2a500")}>✓ Firmado</span>}
          </div>
          {!cl.responsableFirma && (
            <div>
              <div style={{ fontSize: 14, color: "#cbd5e1", marginBottom: 10, fontWeight: 600 }}>✍️ Firma del Responsable</div>
              <SignaturePad value={cl.responsableFirma} onChange={(sig) => {
                const updated = { ...cl, responsableFirma: sig };
                setCurrentList(updated);
              }} />
            </div>
          )}
        </div>

        {/* Bottom Actions */}
        <div style={{ display: "flex", gap: 12, justifyContent: "center", marginTop: 24, flexWrap: "wrap" }}>
          <button style={s.btnSecondary} onClick={() => { saveList(cl); notify("Progreso guardado"); }}>
            Guardar Progreso
          </button>
          <button style={{ ...s.btnSecondary, borderColor: "rgba(196,30,0,0.4)", opacity: uploading ? 0.6 : 1 }} disabled={uploading} onClick={() => exportPDF(cl)}>
            {uploading ? "⏳ Subiendo a SharePoint..." : "📤 Exportar PDF a SharePoint"}
          </button>
          <button style={{ ...s.btnSecondary, background: "rgba(239,68,68,0.12)", borderColor: "rgba(239,68,68,0.3)", color: "#fca5a5" }}
            onClick={manualClose}>
            🔒 Cerrar Lista Manualmente
          </button>
          {!cl.responsableFirma && (
            <div style={{ width: "100%", textAlign: "center", padding: "10px 16px", background: "rgba(226,165,0,0.12)", border: "1px solid rgba(226,165,0,0.3)", borderRadius: 10, color: "#e2a500", fontSize: 13, fontWeight: 600 }}>
              ⚠ La firma del Responsable es obligatoria para cerrar la lista — fírmala arriba ☝️
            </div>
          )}
          {allComplete && (
            <button style={s.btnPrimary} onClick={markComplete}>
              ✓ Completada — Cerrar y Archivar
            </button>
          )}
        </div>
      </div>
    );
  };

  const renderKPI = () => {
    const kpis = getKPIs();

    return (
      <div style={{ maxWidth: 1100, margin: "0 auto", padding: 24 }}>
        <h2 style={{ fontSize: 26, fontWeight: 800, color: "#fff", marginBottom: 8 }}>Indicadores de Asistencia</h2>
        <p style={{ color: "#94a3b8", fontSize: 14, marginBottom: 24 }}>Seguimiento de cobertura por área y cargo</p>

        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(180px, 1fr))", gap: 16, marginBottom: 32 }}>
          <div style={s.card}>
            <div style={{ fontSize: 11, color: "#94a3b8", marginBottom: 6 }}>EMPLEADOS EN SHAREPOINT</div>
            <div style={{ fontSize: 32, fontWeight: 800, color: "#3b82f6" }}>{kpis.totalEmployees}</div>
          </div>
          <div style={s.card}>
            <div style={{ fontSize: 11, color: "#94a3b8", marginBottom: 6 }}>CERRADAS (EN SP)</div>
            <div style={{ fontSize: 32, fontWeight: 800, color: "#22c55e" }}>{kpis.completedLists}</div>
          </div>
          <div style={s.card}>
            <div style={{ fontSize: 11, color: "#94a3b8", marginBottom: 6 }}>ACTIVAS EN APP</div>
            <div style={{ fontSize: 32, fontWeight: 800, color: "#f59e0b" }}>{kpis.activeLists}</div>
          </div>
          <div style={s.card}>
            <div style={{ fontSize: 11, color: "#94a3b8", marginBottom: 6 }}>TOTAL HIST\u00d3RICO</div>
            <div style={{ fontSize: 32, fontWeight: 800, color: "#e2a500" }}>{kpis.totalLists}</div>
          </div>
        </div>

        {/* By Area */}
        <div style={{ ...s.card, marginBottom: 24 }}>
          <h3 style={{ margin: "0 0 16px", fontSize: 16, fontWeight: 700, color: "#e2a500" }}>Cobertura por Área</h3>
          {Object.entries(kpis.byArea).map(([area, data]) => {
            const pct = data.total > 0 ? Math.round((data.attended / data.total) * 100) : 0;
            return (
              <div key={area} style={{ marginBottom: 14 }}>
                <div style={{ display: "flex", justifyContent: "space-between", fontSize: 13, marginBottom: 4 }}>
                  <span style={{ fontWeight: 600 }}>{area}</span>
                  <span style={{ color: pct === 100 ? "#22c55e" : pct >= 80 ? "#f59e0b" : "#ef4444" }}>
                    {data.attended}/{data.total} ({pct}%)
                  </span>
                </div>
                <div style={{ background: "rgba(255,255,255,0.08)", borderRadius: 6, height: 10, overflow: "hidden" }}>
                  <div style={{
                    height: "100%", borderRadius: 6, width: `${pct}%`,
                    background: pct === 100 ? "#22c55e" : pct >= 80 ? "#f59e0b" : "#ef4444",
                    transition: "width 0.5s",
                  }} />
                </div>
              </div>
            );
          })}
        </div>

        {/* By Cargo */}
        <div style={s.card}>
          <h3 style={{ margin: "0 0 16px", fontSize: 16, fontWeight: 700, color: "#e2a500" }}>Cobertura por Cargo</h3>
          {Object.entries(kpis.byCargo).map(([cargo, data]) => {
            const pct = data.total > 0 ? Math.round((data.attended / data.total) * 100) : 0;
            return (
              <div key={cargo} style={{ marginBottom: 14 }}>
                <div style={{ display: "flex", justifyContent: "space-between", fontSize: 13, marginBottom: 4 }}>
                  <span style={{ fontWeight: 600 }}>{cargo}</span>
                  <span style={{ color: pct === 100 ? "#22c55e" : pct >= 80 ? "#f59e0b" : "#ef4444" }}>
                    {data.attended}/{data.total} ({pct}%)
                  </span>
                </div>
                <div style={{ background: "rgba(255,255,255,0.08)", borderRadius: 6, height: 10, overflow: "hidden" }}>
                  <div style={{
                    height: "100%", borderRadius: 6, width: `${pct}%`,
                    background: pct === 100 ? "#22c55e" : pct >= 80 ? "#f59e0b" : "#ef4444",
                    transition: "width 0.5s",
                  }} />
                </div>
              </div>
            );
          })}
        </div>

        {/* Per-list breakdown */}
        {kpis.allEntries.length > 0 && (
          <div style={{ ...s.card, marginTop: 24 }}>
            <h3 style={{ margin: "0 0 16px", fontSize: 16, fontWeight: 700, color: "#e2a500" }}>Detalle por Lista (activas + archivadas)</h3>
            <div style={{ overflowX: "auto" }}>
              <table style={{ width: "100%", borderCollapse: "collapse" }}>
                <thead>
                  <tr style={{ borderBottom: "2px solid rgba(255,255,255,0.1)" }}>
                    {["Lista", "Tema", "Tipo", "Total", "Firmados", "%", "😊", "😐", "😞", "Estado"].map(h => (
                      <th key={h} style={{ textAlign: "left", padding: "10px 8px", fontSize: 10, fontWeight: 700, color: "#94a3b8", textTransform: "uppercase" }}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {kpis.allEntries.map(entry => {
                    const p2 = entry.porcentaje || 0;
                    const mc = entry.moodCounts || [0, 0, 0];
                    const isHistory = entry.source === "history";
                    return (
                      <tr key={entry.id} style={{ borderBottom: "1px solid rgba(255,255,255,0.05)", opacity: isHistory ? 0.7 : 1 }}>
                        <td style={{ padding: "10px 8px", fontSize: 12, fontWeight: 600 }}>{entry.nRegistro}</td>
                        <td style={{ padding: "10px 8px", fontSize: 12 }}>{entry.tema || "—"}</td>
                        <td style={{ padding: "10px 8px", fontSize: 11 }}>{entry.tipoActividad || "—"}</td>
                        <td style={{ padding: "10px 8px", fontSize: 12, textAlign: "center" }}>{entry.totalAsistentes || 0}</td>
                        <td style={{ padding: "10px 8px", fontSize: 12, textAlign: "center" }}>{entry.firmados || 0}</td>
                        <td style={{ padding: "10px 8px" }}>
                          <div style={{
                            display: "inline-block", padding: "3px 10px", borderRadius: 20, fontSize: 12, fontWeight: 700,
                            background: p2 === 100 ? "#22c55e22" : p2 >= 80 ? "#f59e0b22" : "#ef444422",
                            color: p2 === 100 ? "#22c55e" : p2 >= 80 ? "#f59e0b" : "#ef4444",
                          }}>{p2}%</div>
                        </td>
                        <td style={{ padding: "10px 8px", fontSize: 14, textAlign: "center" }}>{mc[0]}</td>
                        <td style={{ padding: "10px 8px", fontSize: 14, textAlign: "center" }}>{mc[1]}</td>
                        <td style={{ padding: "10px 8px", fontSize: 14, textAlign: "center" }}>{mc[2]}</td>
                        <td style={{ padding: "10px 8px" }}>
                          <span style={s.badge(isHistory ? "#22c55e" : "#f59e0b")}>
                            {isHistory ? "📁 En SP" : "⏳ Activa"}
                          </span>
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </div>
        )}
      </div>
    );
  };

  // ========== VISTA PÚBLICA DE FIRMA (link compartido) ==========
  const renderPublicFirma = () => {
    if (!publicFirmaList) {
      return (
        <div style={{ minHeight:"100vh", background:"linear-gradient(135deg,#0f0f1a,#1a1a2e)", display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", color:"#e2e8f0", padding:24 }}>
          <div style={{ fontSize:48, marginBottom:16 }}>⏳</div>
          <div style={{ fontSize:18, fontWeight:700 }}>Cargando lista de asistencia...</div>
          <div style={{ fontSize:13, color:"#94a3b8", marginTop:8 }}>Si tarda mucho, verifica que el link sea correcto.</div>
        </div>
      );
    }
    const list = publicFirmaList;
    const signed = list.attendees.filter(a => a.firma).length;
    const pct = list.attendees.length > 0 ? Math.round((signed/list.attendees.length)*100) : 0;

    const guardarFirmaPublica = async (firma, mood, obs) => {
      if (!publicFirmaPersona) return;
      const personaId = publicFirmaPersona.id;
      const personaDni = publicFirmaPersona.dni;
      const updated = { ...list, attendees: list.attendees.map(a =>
        (a.id === personaId || (personaDni && a.dni === personaDni))
          ? {...a, firma, mood, observaciones:obs, signedAt:new Date().toISOString()}
          : a
      )};
      setPublicFirmaList(updated);
      try {
        const res = await window.storage.get(STORAGE_KEY);
        const allLists = res?.value ? JSON.parse(res.value) : [];
        const li = allLists.findIndex(l => String(l.id) === String(list.id));
        if (li >= 0) { allLists[li] = updated; await window.storage.set(STORAGE_KEY, JSON.stringify(allLists)); }
      } catch(e) { console.error(e); }
      setPublicFirmaExito(true);
      setPublicFirmaPersona(null);
      setPublicFirmaBusqueda("");
    };

    if (publicFirmaExito) return (
      <div style={{ minHeight:"100vh", background:"linear-gradient(135deg,#0f172a,#042f2e)", display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", color:"#e2e8f0", padding:24, textAlign:"center" }}>
        <div style={{ fontSize:72, marginBottom:20 }}>✅</div>
        <h1 style={{ fontSize:28, fontWeight:800, color:"#22c55e", marginBottom:8 }}>¡Firma registrada!</h1>
        <p style={{ color:"#94a3b8", fontSize:16, marginBottom:32 }}>Tu asistencia fue registrada correctamente.</p>
        <div style={{ background:"rgba(34,197,94,0.1)", border:"1px solid rgba(34,197,94,0.3)", borderRadius:16, padding:"20px 32px", marginBottom:24 }}>
          <div style={{ fontSize:13, color:"#86efac" }}>{list.tema} · {list.fecha} · {list.nRegistro}</div>
        </div>
        <button onClick={() => setPublicFirmaExito(false)} style={{ padding:"12px 28px", borderRadius:10, background:"rgba(255,255,255,0.1)", border:"1px solid rgba(255,255,255,0.2)", color:"#fff", fontWeight:600, fontSize:15, cursor:"pointer", fontFamily:"'DM Sans',sans-serif" }}>← Firma otra persona</button>
      </div>
    );

    if (publicFirmaPersona) {
      return <FirmaCard
        persona={publicFirmaPersona}
        list={list}
        pct={pct}
        signed={signed}
        onGuardar={guardarFirmaPublica}
        onVolver={() => setPublicFirmaPersona(null)}
      />;
    }

    const resultados = publicFirmaBusqueda.length >= 2
      ? list.attendees.filter(a => {
          const q = publicFirmaBusqueda.toLowerCase().trim();
          return (a.nombres && a.nombres.toLowerCase().includes(q))
            || (a.dni && a.dni.includes(publicFirmaBusqueda.trim()))
            || (a.fotocheck && a.fotocheck.includes(publicFirmaBusqueda.trim()));
        })
      : [];

    return (
      <div style={{ minHeight:"100vh", background:"linear-gradient(135deg,#0f0f1a,#1a1a2e)", color:"#e2e8f0", paddingBottom:40 }}>
        <div style={{ background:"linear-gradient(90deg,#c41e00,#e2a500)", padding:"16px 20px" }}>
          <div style={{ maxWidth:600, margin:"0 auto" }}>
            <div style={{ fontWeight:800, fontSize:20, color:"#fff" }}>📋 Lista de Asistencia</div>
            <div style={{ fontSize:13, color:"rgba(255,255,255,0.85)", marginTop:2 }}>{list.tema}</div>
            <div style={{ fontSize:11, color:"rgba(255,255,255,0.7)", marginTop:2 }}>{list.fecha} · {list.nHoras}h · {list.nRegistro}</div>
          </div>
        </div>
        <div style={{ maxWidth:600, margin:"0 auto", padding:"28px 16px" }}>
          <div style={{ background:"rgba(255,255,255,0.06)", borderRadius:12, padding:"16px 20px", marginBottom:28, display:"flex", gap:24, flexWrap:"wrap", alignItems:"center" }}>
            <div style={{ textAlign:"center" }}><div style={{ fontSize:28, fontWeight:800, color:pct===100?"#22c55e":"#e2a500" }}>{pct}%</div><div style={{ fontSize:11, color:"#94a3b8" }}>Completado</div></div>
            <div style={{ textAlign:"center" }}><div style={{ fontSize:28, fontWeight:800, color:"#22c55e" }}>{signed}</div><div style={{ fontSize:11, color:"#94a3b8" }}>Firmaron</div></div>
            <div style={{ textAlign:"center" }}><div style={{ fontSize:28, fontWeight:800, color:"#ef4444" }}>{list.attendees.length-signed}</div><div style={{ fontSize:11, color:"#94a3b8" }}>Pendientes</div></div>
            <div style={{ flex:1, minWidth:100 }}><div style={{ background:"rgba(255,255,255,0.08)", borderRadius:6, height:10, overflow:"hidden" }}><div style={{ height:"100%", borderRadius:6, width:`${pct}%`, background:pct===100?"#22c55e":"linear-gradient(90deg,#c41e00,#e2a500)", transition:"width 0.5s" }}/></div></div>
          </div>
          <div style={{ background:"rgba(255,255,255,0.05)", border:"1px solid rgba(255,255,255,0.1)", borderRadius:16, padding:24 }}>
            <h2 style={{ margin:"0 0 6px", fontSize:20, fontWeight:800, color:"#fff" }}>🔍 Busca tu nombre</h2>
            <p style={{ color:"#94a3b8", fontSize:14, margin:"0 0 20px" }}>Escribe tu nombre o DNI para firmar tu asistencia</p>
            <input type="text" autoFocus placeholder="Ej: QUISPE MAMANI o 70123456..." value={publicFirmaBusqueda} onChange={e=>setPublicFirmaBusqueda(e.target.value)}
              style={{ width:"100%", padding:"14px 18px", borderRadius:10, border:"1px solid rgba(255,255,255,0.2)", background:"rgba(255,255,255,0.1)", color:"#e2e8f0", fontSize:16, fontFamily:"'DM Sans',sans-serif", outline:"none" }} />
            {publicFirmaBusqueda.length >= 2 && (
              <div style={{ marginTop:16 }}>
                {resultados.length === 0 ? (
                  <div style={{ padding:16, color:"#94a3b8", textAlign:"center", fontSize:14 }}>No se encontró ese nombre o DNI en esta lista.<br/><span style={{ fontSize:12, color:"#64748b" }}>Verifica que estés convocado.</span></div>
                ) : (
                  <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
                    {resultados.map((a,i) => {
                      const yf = !!a.firma;
                      return (
                        <button key={a.id || i} onClick={() => !yf && setPublicFirmaPersona(a)} style={{ width:"100%", padding:"14px 18px", borderRadius:12, border:yf?"2px solid rgba(34,197,94,0.4)":"2px solid rgba(255,255,255,0.15)", background:yf?"rgba(34,197,94,0.08)":"rgba(255,255,255,0.05)", color:"#e2e8f0", cursor:yf?"default":"pointer", textAlign:"left", fontFamily:"'DM Sans',sans-serif", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                          <div>
                            <div style={{ fontWeight:700, fontSize:16, color:yf?"#22c55e":"#fff" }}>{a.nombres}</div>
                            <div style={{ fontSize:12, color:"#94a3b8", marginTop:2 }}>DNI: {a.dni} · {a.cargo} · {a.area}</div>
                          </div>
                          <span style={{ fontSize:13, fontWeight:700, padding:"4px 12px", borderRadius:20, background:yf?"rgba(34,197,94,0.2)":"rgba(226,165,0,0.2)", color:yf?"#22c55e":"#e2a500" }}>{yf?"✓ Firmado":"Firmar →"}</span>
                        </button>
                      );
                    })}
                  </div>
                )}
              </div>
            )}
          </div>
        </div>
      </div>
    );
  };

  return (
    <div style={s.app}>
      <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet" />
      <style>{`
        * { box-sizing: border-box; }
        @keyframes slideIn { from { transform: translateX(80px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes pulse { 0%,100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.15); opacity: 0.7; } }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }
        input::placeholder, select::placeholder { color: #64748b; }
        @media (max-width: 600px) {
          .sign-card { padding: 14px !important; }
        }
      `}</style>

      {renderNotification()}
      {renderConfirmModal()}

      {loading ? renderLoading() : publicFirmaListId ? renderPublicFirma() : (<>

      {/* Uploading Overlay */}
      {uploading && (
        <div style={{
          position: "fixed", inset: 0, zIndex: 9000,
          background: "rgba(0,0,0,0.5)", backdropFilter: "blur(2px)",
          display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 12,
        }}>
          <div style={{ fontSize: 36, animation: "pulse 1s ease-in-out infinite" }}>📤</div>
          <div style={{ color: "#fff", fontSize: 16, fontWeight: 600 }}>Subiendo a SharePoint...</div>
          <div style={{ color: "#94a3b8", fontSize: 13 }}>No cierres la app</div>
        </div>
      )}

      {/* Header */}
      <div style={s.header}>
        <div style={s.headerInner}>
          <div style={s.logo}>
            <div>
              <div style={s.logoText}>Sagitario</div>
              <div style={s.logoSub}>Sistema de Asistencia</div>
            </div>
          </div>
          <div style={s.nav}>
            <button style={s.navBtn(view === "dashboard")} onClick={() => setView("dashboard")}>📋 Listas</button>
            <button style={s.navBtn(view === "kpi")} onClick={() => setView("kpi")}>📊 Indicadores</button>
            <button style={s.navBtn(false)} onClick={createNewList}>+ Nueva</button>
          </div>
        </div>
      </div>

      {/* Content */}
      {view === "dashboard" && renderDashboard()}
      {view === "create" && renderCreateEdit()}
      {view === "sign" && renderSignMode()}
      {view === "kpi" && renderKPI()}

      </>)}
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
